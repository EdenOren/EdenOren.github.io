<section class="hero">
  <div class="hero__bg" aria-hidden="true"></div>

  <div class="hero__content">
    <p class="hero__greeting no-select">{{ facade.greeting() }}</p>

    <h1 class="hero__name no-select">
      <span class="hero__name-first">{{ facade.nameFirst() }}</span>
      <span class="hero__name-last">{{ facade.nameLast() }}</span>
    </h1>

    <p class="hero__role no-select">{{ facade.title() }}</p>
    <p class="hero__tagline">{{ facade.tagline() }}</p>

    <div class="hero__actions">
      <a class="hero__cta hero__cta--filled no-select" routerLink="/projects">
        {{ facade.ctaWork() }}
      </a>
      <a class="hero__cta hero__cta--outline no-select" routerLink="/contact">
        {{ facade.ctaContact() }}
      </a>
    </div>
  </div>
</section>
