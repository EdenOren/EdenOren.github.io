<section class="hero" id="hero">
  <div class="hero__bg" aria-hidden="true"></div>

  @let t = translation();
  <div class="hero__content">
    <p class="hero__greeting no-select">{{ t['GREETING'] }}</p>

    <h1 class="hero__name no-select">
      <span class="hero__name-first">{{ t['NAME_FIRST'] }}</span>
      <span class="hero__name-last">{{ t['NAME_LAST'] }}</span>
    </h1>

    <p class="hero__role no-select">{{ t['TITLE'] }}</p>
    <p class="hero__tagline">{{ t['TAGLINE'] }}</p>

    <div class="hero__actions">
      <app-cta-button [variant]="ButtonVariant.Filled" (click)="scrollToSection('projects')">
        {{ t['CTA_WORK'] }}
      </app-cta-button>
      <app-cta-button [variant]="ButtonVariant.Outline" (click)="scrollToSection('contact')">
        {{ t['CTA_CONTACT'] }}
      </app-cta-button>
    </div>
  </div>
</section>
