<section class="contact">
  <div class="contact__inner">

    @let t = facade.translation();
    <div class="contact__header">
      <p class="contact__section-number no-select" aria-hidden="true">{{ facade.SECTION_NUMBER }}</p>
      <h2 class="contact__heading no-select">{{ t['HEADING'] }}</h2>
    </div>

    @if (facade.isSuccess()) {
      <p class="contact__success" role="status" aria-live="polite">{{ t['SUCCESS'] }}</p>
    } @else {
      <form
        class="contact__form"
        (submit)="$event.preventDefault(); facade.submit()"
        novalidate>

        <div class="contact__field">
          <label class="contact__label" for="contact-name">{{ t['NAME_LABEL'] }}</label>
          <input
            class="contact__input"
            id="contact-name"
            type="text"
            autocomplete="name"
            [placeholder]="t['NAME_PLACEHOLDER']"
            [value]="facade.name()"
            (input)="facade.name.set($any($event.target).value)"
            [disabled]="facade.isLoading()" />
        </div>

        <div class="contact__field">
          <label class="contact__label" for="contact-email">{{ t['EMAIL_LABEL'] }}</label>
          <input
            class="contact__input"
            id="contact-email"
            type="email"
            autocomplete="email"
            [placeholder]="t['EMAIL_PLACEHOLDER']"
            [value]="facade.email()"
            (input)="facade.email.set($any($event.target).value)"
            [disabled]="facade.isLoading()" />
        </div>

        <div class="contact__field">
          <label class="contact__label" for="contact-message">{{ t['MESSAGE_LABEL'] }}</label>
          <textarea
            class="contact__textarea"
            id="contact-message"
            [attr.rows]="TEXTAREA_ROWS"
            [placeholder]="t['MESSAGE_PLACEHOLDER']"
            [value]="facade.message()"
            (input)="facade.message.set($any($event.target).value)"
            [disabled]="facade.isLoading()"></textarea>
        </div>

        @if (facade.isError()) {
          <p class="contact__error" role="alert" aria-live="assertive">{{ t['ERROR'] }}</p>
        }

        <button
          class="contact__submit no-select"
          type="submit"
          [disabled]="!facade.isValid() || facade.isLoading()"
          [class.contact__submit--loading]="facade.isLoading()">
          @if (facade.isLoading()) {
            <span class="contact__submit-spinner" aria-hidden="true"></span>
          }
          {{ t['SUBMIT'] }}
        </button>

      </form>
    }

  </div>
</section>
