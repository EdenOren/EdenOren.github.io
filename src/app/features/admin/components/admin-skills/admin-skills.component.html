<div class="admin-skills">
  <div class="admin-skills__header">
    <h2 class="admin-skills__title">Skills</h2>
    @if (!facade.isFormOpen()) {
      <button class="admin-skills__add-btn" type="button" (click)="facade.openAdd()">
        + Add Group
      </button>
    }
  </div>

  @if (facade.isFormOpen()) {
    <div class="admin-skills__form">
      <h3 class="admin-skills__form-title">
        {{ facade.isEditing() ? 'Edit Group' : 'New Group' }}
      </h3>
      <div class="admin-skills__form-fields">
        <div class="admin-skills__field">
          <label class="admin-skills__label">Label *</label>
          <input class="admin-skills__input" type="text"
                 [value]="facade.labelField()"
                 (input)="facade.labelField.set($any($event.target).value)"
                 placeholder="e.g. Frontend" />
        </div>
        <div class="admin-skills__field">
          <label class="admin-skills__label">Skills (comma-separated)</label>
          <textarea class="admin-skills__input admin-skills__input--textarea"
                    rows="3"
                    [value]="facade.skillsField()"
                    (input)="facade.skillsField.set($any($event.target).value)"
                    placeholder="Angular, TypeScript, SCSS"></textarea>
        </div>
      </div>
      <div class="admin-skills__form-actions">
        <button class="admin-skills__save-btn" type="button"
                [disabled]="!facade.isFormValid()"
                (click)="facade.save()">
          {{ facade.isEditing() ? 'Save' : 'Add' }}
        </button>
        <button class="admin-skills__cancel-btn" type="button" (click)="facade.closeForm()">
          Cancel
        </button>
      </div>
    </div>
  }

  <ul class="admin-skills__list">
    @for (group of facade.groups(); track group.id) {
      <li class="admin-skills__item">
        <div class="admin-skills__item-header">
          <span class="admin-skills__group-label">{{ group.label }}</span>
          <div class="admin-skills__item-actions">
            <button class="admin-skills__edit-btn" type="button" (click)="facade.openEdit(group)">
              Edit
            </button>
            <button class="admin-skills__delete-btn" type="button" (click)="facade.remove(group.id)">
              Delete
            </button>
          </div>
        </div>
        <div class="admin-skills__pills">
          @for (skill of group.skills; track skill) {
            <span class="admin-skills__pill">{{ skill }}</span>
          }
        </div>
      </li>
    }
  </ul>
</div>
