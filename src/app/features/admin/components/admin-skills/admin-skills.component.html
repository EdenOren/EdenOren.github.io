<div class="admin-crud">
  <div class="admin-crud__header">
    <h2 class="admin-crud__title">Skills</h2>
    @if (!isFormOpen()) {
      <button class="admin-crud__add-btn" type="button" (click)="openAdd()">
        + Add Group
      </button>
    }
  </div>

  @if (isFormOpen()) {
    <div class="admin-crud__form">
      <h3 class="admin-crud__form-title">
        {{ isEditing() ? 'Edit Group' : 'New Group' }}
      </h3>
      <div class="admin-crud__form-fields">
        <div class="admin-crud__field">
          <label class="admin-crud__label">Label *</label>
          <input class="admin-crud__input" type="text"
                 [formField]="labelField"
                 placeholder="e.g. Frontend" />
        </div>
        <div class="admin-crud__field">
          <label class="admin-crud__label">Skills (comma-separated)</label>
          <textarea class="admin-crud__input admin-crud__input--textarea"
                    rows="3"
                    [formField]="skillsField"
                    placeholder="Angular, TypeScript, SCSS"></textarea>
        </div>
      </div>
      <div class="admin-crud__form-actions">
        <button class="admin-crud__save-btn" type="button"
                [disabled]="!isFormValid()"
                (click)="save()">
          {{ isEditing() ? 'Save' : 'Add' }}
        </button>
        <button class="admin-crud__cancel-btn" type="button" (click)="closeForm()">
          Cancel
        </button>
      </div>
    </div>
  }

  <ul class="admin-crud__list">
    @for (group of groups(); track group.id) {
      <li class="admin-crud__item">
        <div class="admin-crud__item-header admin-crud__item-header--center">
          <span class="admin-crud__group-label">{{ group.label }}</span>
          <div class="admin-crud__item-actions">
            <button class="admin-crud__edit-btn" type="button" (click)="openEdit(group)">
              Edit
            </button>
            <button class="admin-crud__delete-btn" type="button" (click)="openDeleteFor(group.id)">
              Delete
            </button>
          </div>
        </div>
        <div class="admin-crud__pills">
          @for (skill of group.skills; track skill) {
            <span class="admin-crud__pill">{{ skill }}</span>
          }
        </div>
      </li>
    }
  </ul>

  @if (isDeleteDialogOpen()) {
    <confirm-dialog
      [message]="deleteDialogMessage()"
      (confirm)="confirmDelete()"
      (cancel)="cancelDelete()" />
  }
</div>
