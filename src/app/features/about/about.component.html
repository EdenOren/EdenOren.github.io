<section class="about" appScrollReveal id="about">
  <div class="about__inner">

    <div class="about__portrait-col">
      <div class="about__frame">
        <div class="about__frame-inner" aria-hidden="true">
          @if (!portraitUrl()) {
            <div class="about__initials no-select">EO</div>
          }
        </div>
        <div class="about__frame-accent" aria-hidden="true"></div>
        @if (portraitUrl()) {
          <img class="about__portrait" [src]="portraitUrl()" alt="Eden Oren" />
        }
      </div>

      <ul class="about__social" role="list" aria-label="Social links">
        @for (link of SOCIAL_LINKS; track link.key) {
          <li class="about__social-item">
            <a
              class="about__social-link no-select"
              [href]="link.href"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="link.ariaLabel()">
              <span class="about__social-icon" [attr.data-icon]="link.icon" aria-hidden="true"></span>
              <span class="about__social-label">{{ link.label }}</span>
            </a>
          </li>
        }
      </ul>
    </div>

    @let t = translation();
    <div class="about__text-col">
      <h2 class="about__heading no-select">{{ t['HEADING'] }}</h2>

      <div class="about__bio">
        @for (paragraph of bioParagraphs(); track paragraph) {
          <p class="about__bio-paragraph">{{ paragraph }}</p>
        }
      </div>
    </div>

  </div>
</section>
