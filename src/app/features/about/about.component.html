<section class="about">
  <div class="about__inner">

    <div class="about__portrait-col">
      <div class="about__frame" aria-hidden="true">
        <div class="about__frame-inner">
          <div class="about__initials no-select">EO</div>
        </div>
        <div class="about__frame-accent"></div>
      </div>

      <ul class="about__social" role="list" aria-label="Social links">
        @for (link of facade.SOCIAL_LINKS; track link.key) {
          <li class="about__social-item">
            <a
              class="about__social-link no-select"
              [href]="link.href"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="link.ariaLabel()">
              <span class="about__social-icon" [attr.data-icon]="link.icon" aria-hidden="true"></span>
              <span class="about__social-label">{{ link.label }}</span>
            </a>
          </li>
        }
      </ul>
    </div>

    @let t = facade.translation();
    <div class="about__text-col">
      <p class="about__section-number no-select" aria-hidden="true">{{ facade.SECTION_NUMBER }}</p>
      <h2 class="about__heading no-select">{{ t['HEADING'] }}</h2>

      <div class="about__bio">
        <p class="about__bio-paragraph">{{ t['BIO_1'] }}</p>
        <p class="about__bio-paragraph">{{ t['BIO_2'] }}</p>
        <p class="about__bio-paragraph">{{ t['BIO_3'] }}</p>
      </div>
    </div>

  </div>
</section>
