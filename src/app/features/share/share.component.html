@let t = translation();

<div class="share">
  @if (canUseNativeShare) {
    <app-icon-button
      [iconSrc]="Icon.Share"
      [iconWidth]="14"
      [iconHeight]="14"
      [label]="t['BUTTON_LABEL']"
      [iconOnly]="true"
      (click)="onTriggerClick()" />
  } @else {
    <app-icon-button
      [iconSrc]="Icon.Share"
      [iconWidth]="14"
      [iconHeight]="14"
      [label]="t['BUTTON_LABEL']"
      [iconOnly]="true"
      [ariaExpanded]="isPanelOpen()"
      [ariaHasPopup]="true"
      (click)="onTriggerClick()" />

    @if (isPanelOpen()) {
      <div class="share__panel" role="menu" [attr.aria-label]="t['PANEL_LABEL']" animate.enter="share-panel-enter">

        <a
          class="share__item"
          role="menuitem"
          [href]="whatsappUrl"
          target="_blank"
          rel="noopener noreferrer">
          <img class="share__item-icon" [ngSrc]="Icon.Whatsapp" width="16" height="16" alt="" aria-hidden="true">
          <span>{{ t['WHATSAPP'] }}</span>
        </a>

        <a
          class="share__item"
          role="menuitem"
          [href]="emailUrl">
          <img class="share__item-icon" [ngSrc]="Icon.Mail" width="16" height="16" alt="" aria-hidden="true">
          <span>{{ t['EMAIL'] }}</span>
        </a>

        <button
          class="share__item"
          role="menuitem"
          type="button"
          (click)="copyLink()">
          <img class="share__item-icon" [ngSrc]="Icon.Link" width="16" height="16" alt="" aria-hidden="true">
          <span>
            @if (isCopied()) {
              {{ t['COPIED'] }}
            } @else {
              {{ t['COPY_LINK'] }}
            }
          </span>
        </button>

      </div>
    }

    <span class="share__live-region" aria-live="polite" aria-atomic="true">
      @if (isCopied()) {
        {{ t['COPIED'] }}
      }
    </span>
  }
</div>
