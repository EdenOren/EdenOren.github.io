<div class="confirm-dialog__backdrop" (click)="onCancel()">
  <div class="confirm-dialog__card"
       role="dialog"
       aria-modal="true"
       [attr.aria-label]="message()"
       (click)="$event.stopPropagation()">
    <p class="confirm-dialog__message">{{ message() }}</p>
    <div class="confirm-dialog__actions">
      <app-button [variant]="buttonVariant.Ghost" (click)="onCancel()">
        {{ 'ADMIN.CANCEL' | translate }}
      </app-button>
      <app-button [variant]="buttonVariant.Danger" (click)="onConfirm()">
        {{ 'ADMIN.DELETE' | translate }}
      </app-button>
    </div>
  </div>
</div>
