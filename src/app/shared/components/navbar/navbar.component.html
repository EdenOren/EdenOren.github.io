<nav class="navbar" [class.navbar--scrolled]="isScrolled()" [class.navbar--open]="isMenuOpen()">
  <div class="navbar__inner">
    <a class="navbar__logo no-select" routerLink="/">
      E. Oren
    </a>

    <button
      class="navbar__burger no-select"
      [class.navbar__burger--open]="isMenuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation"
      aria-controls="navbar-drawer"
    >
      <span class="navbar__burger-line"></span>
      <span class="navbar__burger-line"></span>
      <span class="navbar__burger-line"></span>
    </button>

    <div
      class="navbar__overlay"
      [class.navbar__overlay--visible]="isMenuOpen()"
      (click)="closeMenu()"
      aria-hidden="true"
    ></div>

    @let t = translation();
    <div class="navbar__drawer" id="navbar-drawer" [class.navbar__drawer--open]="isMenuOpen()">
      <ul class="navbar__links" role="list">
        @for (link of NAV_LINKS; track link.sectionId) {
          <li class="navbar__item">
            <button
              class="navbar__link no-select"
              type="button"
              [class.navbar__link--active]="activeSection() === link.sectionId"
              (click)="scrollToSection(link.sectionId); closeMenu()"
            >
              {{ t[link.labelKey] }}
            </button>
          </li>
        }
      </ul>

      <div class="navbar__share">
        <app-social-share />
      </div>

      @if (isAuthenticated()) {
        <a
          class="navbar__admin-link"
          routerLink="/admin/experience"
          (click)="closeMenu()"
        >
          Admin
        </a>
      }
    </div>
  </div>
</nav>
